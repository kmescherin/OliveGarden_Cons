services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    env_file: ./apps/web/.env
    environment:
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          memory: 900M
    networks:
      - olivegarden
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    networks:
      - olivegarden
    restart: unless-stopped

networks:
  olivegarden:
    external: true
